<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <title>TruWord Music</title>
  <style>
    /* Include padding/margins in height calculations */
    html {
      box-sizing: border-box;
      height: 100%;
    }
    *, *:before, *:after {
      box-sizing: inherit;
    }

    body {
      font-family: "Futura", sans-serif;
      background-color: black;
      color: #DFDFDF;

      display: flex;
      flex-direction: column;
      justify-content: center; /* vertical center */
      align-items: center;     /* horizontal center */
      text-align: center;

      min-height: 100vh;       /* fill the viewport */
      margin: 0;
      padding: 20px;           /* safe padding */
    }

    img.logo {
      max-width: 100px;
      margin: 0 auto 15px auto; /* slightly closer to headline */
    }

    .app-headline {
      font-weight: bold;
      font-size: 1.7em;
      color: #FAFAFA;
      margin: 0 0 5px 0;        /* reduced space below */
    }

    p.subheadline {
      font-size: 1.1em;
      margin: 0 0 25px 0;       /* reduced space below */
      color: #DFDFDF;
    }

    .appstore-badge {
      max-width: 271px;
      margin: 0 auto 20px;
    }

    footer {
      font-size: 0.9em;
      color: #DFDFDF;
      margin-top: 30px;
    }

    footer a {
      color: #DFDFDF;
      text-decoration: none;
      margin: 0 8px;
    }

    footer a:hover {
      color: #808080;
    }
  </style>
</head>
<body>
  <img class="logo" src="logo.png" alt="TruWord Music Logo">
  <h1 class="app-headline">TruWord Music</h1>
  <p class="subheadline">Discover Top Christian Music</p>

  <!-- App Store Badge -->
  <a href="https://apps.apple.com/us/app/truword-music/id6744539952" target="_blank">
    <img class="appstore-badge" src="appstore-badge.svg" alt="Download on the App Store">
  </a>

  <footer>
    <p>
      <a href="privacy.html">Privacy Policy</a> | 
      <a href="support.html">Support</a>
    </p>
  </footer>
</body>
</html>
