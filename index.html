<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <title>TruWord Music</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden; /* prevents any scrolling */
      background-color: black;
    }

    body {
      font-family: "Futura", sans-serif;
      color: #DFDFDF;
      display: flex;
      justify-content: center;
      align-items: center;
      transform: translateY(-15px);
    }

    .container {
      text-align: center;
      padding: 20px;
    }

    img.logo {
      max-width: 100px;
      display: block;
      margin: 0 auto;
    }

    .app-headline {
      font-weight: bold;
      font-size: 1.7em;
      color: #FAFAFA;
      margin: 5px 0 2px 0;
    }

    p.subheadline {
      font-size: 1.1em;
      margin: 7px 0 30px 0;
    }

    .appstore-badge {
      max-width: 285px;
      display: block;
      margin: 0 auto 20px;
    }

    footer {
      font-size: 0.9em;
      margin-top: 30px;
    }

    footer a {
      color: #DFDFDF;
      text-decoration: none;
      margin: 0 8px;
    }

    footer a:hover {
      color: #808080;
    }
  </style>
</head>

<body>
  <div class="container">
    <img class="logo" src="logo.png" alt="TruWord Music Logo">
    <h1 class="app-headline">TruWord Music</h1>
    <p class="subheadline">Discover Top Christian Music</p>

    <a href="download.html" target="_blank">
      <img class="appstore-badge" src="appstore-badge.svg" alt="Download on the App Store">
    </a>

    <footer>
      <p>
        <a href="privacy.html">Privacy Policy</a> |
        <a href="support.html">Support</a>
      </p>
    </footer>
  </div>
</body>
</html>
