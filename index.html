<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <title>TruWord Music</title>

  <style>
    body {
      font-family: "Futura", sans-serif;
      background-color: black;
      margin: 0;
      color: #DFDFDF;

      /* Perfect Centering */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      min-height: 100svh; /* Prevents mobile scroll issues */
      text-align: center;
      padding: 20px;
    }

    img.logo {
      max-width: 100px;
      display: block;
      margin: 0 auto;
    }

    .app-headline {
      font-weight: bold;
      font-size: 1.7em;
      color: #FAFAFA;
      margin: 5px 0 2px 0;
    }

    p.subheadline {
      font-size: 1.1em;
      margin: 7px 0 30px 0;
      color: #DFDFDF;
    }

    .appstore-badge {
      max-width: 285px;
      display: block;
      margin: 0 auto 20px;
    }

    footer {
      font-size: 0.9em;
      color: #DFDFDF;
      margin-top: 30px;
    }

    footer a {
      color: #DFDFDF;
      text-decoration: none;
      margin: 0 8px;
    }

    footer a:hover {
      color: #808080;
    }
  </style>
</head>

<body>
  <img class="logo" src="logo.png" alt="TruWord Music Logo">
  <h1 class="app-headline">TruWord Music</h1>
  <p class="subheadline">Discover Top Christian Music</p>

  <!-- App Store Badge -->
  <a href="https://apps.apple.com/us/app/truword-music/id6744539952" target="_blank">
    <img class="appstore-badge" src="appstore-badge.svg" alt="Download on the App Store">
  </a>

  <footer>
    <p>
      <a href="privacy.html">Privacy Policy</a> |
      <a href="support.html">Support</a>
    </p>
  </footer>
</body>
</html>
