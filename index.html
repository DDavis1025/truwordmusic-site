hi<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TruWord Music</title>
  <style>
    body {
      font-family: "Futura", sans-serif;
      text-align: center;
      padding: 50px 20px;
      background-color: black;
      margin: 0;
      color: #DFDFDF;
    }
    img.logo {
      max-width: 100px;
      display: block;  /* forces the image to its own row */
      margin: 0 auto;  /* no extra space below */
      padding: 0;
    }
    .app-headline {
      font-weight: bold;
      font-size: 1.7em;
      color: #FFFFFF;
      margin: 0 0 2px 0; /* 0 top, 2px bottom */
    }
    p.subheadline {
      font-size: 1.1em;
      margin: 5px 0 30px 0;
      color: #DFDFDF;
      text-align: center;
    }
    .appstore-badge {
      max-width: 225px;
      display: block;
      margin: 0 auto 20px;
    }
    footer {
      font-size: 0.9em;
      color: #DFDFDF;
      margin-top: 40px;
    }
    footer a {
      color: #DFDFDF;
      text-decoration: none;
      margin: 0 8px;
    }
    footer a:hover {
      color: #808080;
    }
  </style>
</head>
<body>
  <img class="logo" src="logo.png" alt="TruWord Music Logo">
  <h1 class="app-headline">TruWord Music</h1>
  <p class="subheadline">Discover Top Christian Music</p>

  <!-- App Store Badge -->
  <a href="https://apps.apple.com/us/app/truword-music/id6744539952" target="_blank">
    <img class="appstore-badge" src="appstore-badge.svg" alt="Download on the App Store">
  </a>

  <footer>
    <p>
      <a href="privacy.html">Privacy Policy</a> | 
      <a href="support.html">Support</a>
    </p>
  </footer>
</body>
</html>
