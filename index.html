<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TruWord Music</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px 20px;
      background-color: #fefefe;
      margin: 0;
    }
    img {
      max-width: 100px;
      display: block;  /* forces the image to its own row */
      margin: 0 auto 5px; /* centers it and adds space below */
    }
    p {
      font-size: 1.1em;
      margin-bottom: 30px;
      color: #DFDFDF;
    }
    a.button {
      display: inline-block;
      padding: 15px 25px;
      background-color: #000000;     /* black background */
      color: white;                   /* text color */
      text-decoration: none;
      border-radius: 10px;            /* rounded corners */
      border: 2px solid #f0f0f0;     /* light grey border */
      font-size: 1.2em;
      margin-bottom: 20px;
      transition: background-color 0.3s, color 0.3s; /* smooth hover effect */
    }
    a.button:hover {
      background-color: #222222;      /* slightly lighter black on hover */
      color: #ffffff;                 /* keep text white */
    }
    footer {
      font-size: 0.9em;
      color: #555;
      margin-top: 40px;
    }
    footer a {
      color: #DFDFDF;
      text-decoration: none;
      margin: 0 8px;
    }
    footer a:hover {
      color: #38BBFA;
    }
    
    .app-headline {
      font-family: "Futura", sans-serif;
      font-weight: bold;
      font-size: 2em;
      color: #FFFFFF;
      margin-bottom: 5px;
     }
 

  </style>
</head>
<body>
  <img src="logo.png" alt="TruWord Music Logo">
  <h1 class="app-headline">TruWord Music</h1>
  <p class="app-subheadline">Discover Top Christian Music</p>
  <a class="button" href="https://apps.apple.com/app/id6744539952" target="_blank">Download on the App Store</a>
  <footer>
    <p>
      <a href="privacy.html">Privacy Policy</a> | 
      <a href="support.html">Support</a>
    </p>
  </footer>
</body>
</html>
